bundle:
  name: databricks-chatbot

variables:
  serving_endpoint_name:
    description: "Name of the model serving endpoint to be used by the app"
    default: "databricks-claude-sonnet-4"
  sql_warehouse_id:
    description: "SQL warehouse id used by the Policy Compliance dashboard"
    default: "30260ffcfe45ef76"
  policies_table:
    description: "Unity Catalog table backing the Policy Compliance dashboard"
    default: "dev.policies.policy_docs"
  database_instance_name:
    description: "Base name of the Lakebase database instance"
    default: "chatbot-lakebase"
  resource_name_suffix:
    description: "Suffix for resource names (app/lakebase instance names etc). Helpful for avoiding name collisions if multiple users deploy this app to the same workspace"

resources:
  database_instances:
    chatbot_lakebase:
      name: ${var.database_instance_name}-${var.resource_name_suffix}
      capacity: CU_1

  apps:
    databricks_chatbot:
      # NOTE: customize the app name here, if desired
      name: db-chatbot-${var.resource_name_suffix}
      description: "Agentic Chat application for Foundation Models, Agent Bricks, and custom code agents"
      source_code_path: .
      resources:
        - name: serving-endpoint
          description: "Databricks serving endpoint name for the AI agent"
          # NOTE: If chatting with an Agent Bricks Multi-Agent Supervisor (https://docs.databricks.com/aws/en/generative-ai/agent-bricks/multi-agent-supervisor),
          # you need to additionally grant the app service principal the `CAN_QUERY` permission on the
          # underlying agent(s) that the MAS orchestrates. You can do this by adding those
          # agent serving endpoints as additional resources here.
          serving_endpoint:
            name: ${var.serving_endpoint_name}
            permission: CAN_QUERY
        - name: sql-warehouse
          description: "SQL warehouse for the Policy Compliance dashboard"
          sql_warehouse:
            id: ${var.sql_warehouse_id}
            permission: CAN_USE
        - name: policy-table
          description: "Unity Catalog table read by the Policy Compliance dashboard"
          uc_securable:
            securable_full_name: ${var.policies_table}
            securable_type: TABLE
            permission: SELECT
        # NOTE: app resources cannot express USE CATALOG / USE SCHEMA (uc_securable only
        # supports TABLE/VOLUME/FUNCTION/CONNECTION). The dashboard also needs the app's
        # service principal to have USE on the catalog and schema. Grant once per workspace:
        #   GRANT USE CATALOG ON CATALOG dev TO `<app-service-principal-client-id>`;
        #   GRANT USE SCHEMA ON SCHEMA dev.policies TO `<app-service-principal-client-id>`;
        # (find the client id via: databricks apps get <app-name> | jq .service_principal_client_id)
        - name: database
          description: "Lakebase database instance for the chat app"
          database:
            database_name: databricks_postgres
            instance_name: ${resources.database_instances.chatbot_lakebase.name}
            permission: CAN_CONNECT_AND_CREATE
        # TODO (optional): Uncomment the experiment resource below to enable the feedback widget.
        # First run `npx tsx scripts/get-experiment-id.ts --endpoint <your-endpoint-name>` to find the experiment ID.
        # Note: enabling feedback also requires a database (uncomment both TODO database blocks above).
        # - name: experiment
        #   description: "MLflow experiment for collecting user feedback"
        #   experiment:
        #     experiment_id: "your-experiment-id"
        #     permission: CAN_EDIT

targets:
  dev:
    mode: development
    default: true
    variables:
      resource_name_suffix: dev-${workspace.current_user.domain_friendly_name}

  staging:
    mode: production
    variables:
      resource_name_suffix: "staging"

  prod:
    mode: production
    variables:
      resource_name_suffix: "prod"
