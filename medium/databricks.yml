bundle:
  name: agent_openai_agents_sdk

sync:
  exclude:
    - ".databricks"
    - ".claude"
    - ".venv"
    - "node_modules"
    - "load-test-runs"

resources:
  apps:
    agent_openai_agents_sdk:
      name: "agent-nonadmin-l200"
      description: "OpenAI Agents SDK agent application"
      source_code_path: ./
      config:
        command: ["uv", "run", "start-app"]
        env:
          - name: MLFLOW_TRACKING_URI
            value: "databricks"
          - name: MLFLOW_REGISTRY_URI
            value: "databricks-uc"
          - name: API_PROXY
            value: "http://localhost:8000/invocations"
          - name: CHAT_APP_PORT
            value: "3000"
          - name: CHAT_PROXY_TIMEOUT_SECONDS
            value: "300"
          - name: MLFLOW_EXPERIMENT_ID
            value_from: "experiment"
          - name: LAKEBASE_INSTANCE_NAME
            value: "nonadmin-l200"
          - name: LAKEBASE_AGENT_MEMORY_SCHEMA
            value: "agent_openai_memory"
          - name: PGDATABASE
            value: "databricks_postgres"
          - name: PGPORT
            value: "5432"

      # Resources which this app has access to
      resources:
        - name: 'experiment'
          experiment:
            experiment_id: "4011198291053259"
            permission: 'CAN_MANAGE'
        - name: 'database'
          database:
            database_name: databricks_postgres
            instance_name: 'nonadmin-l200'
            permission: CAN_CONNECT_AND_CREATE

targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://dbc-22969be4-7a92.cloud.databricks.com

  prod:
    mode: production
    workspace:
      host: https://dbc-22969be4-7a92.cloud.databricks.com
    resources:
      apps:
        agent_openai_agents_sdk:
          name: agent-nonadmin-l200
