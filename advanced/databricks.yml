bundle:
  name: retail_grocery_ltm_memory

resources:
  apps:
    retail_grocery_ltm_memory:
      name: "retail-grocery-ltm-memory"
      description: "Retail grocery conversational agent with Genie, Vector Search, and long-term memory"
      source_code_path: ./
      config:
        command: ["uv", "run", "start-app"]
        env:
          - name: MLFLOW_TRACKING_URI
            value: "databricks"
          - name: MLFLOW_REGISTRY_URI
            value: "databricks-uc"
          - name: API_PROXY
            value: "http://localhost:8000/invocations"
          - name: CHAT_APP_PORT
            value: "3000"
          - name: CHAT_PROXY_TIMEOUT_SECONDS
            value: "300"
          - name: MLFLOW_EXPERIMENT_ID
            value_from: "experiment"
          - name: LAKEBASE_AUTOSCALING_PROJECT
            value: "l300-workshop-smoke-test"
          - name: LAKEBASE_AUTOSCALING_BRANCH
            value: "l300-workshop-smoke-test-branch"
          - name: GENIE_SPACE_ID
            value_from: "retail_grocery_genie"
          - name: VECTOR_SEARCH_INDEX
            value_from: "policy_docs_index"
      # Resources which this app has access to
      resources:
        - name: "experiment"
          experiment:
            experiment_id: "4040511589772447"
            permission: "CAN_MANAGE"
        - name: "retail_grocery_genie"
          genie_space:
            name: "Retail Data"
            space_id: "01f1595900051132b572b1f717285d6f"
            permission: "CAN_RUN"
        - name: "postgres"
          postgres:
            branch: "projects/l300-workshop-smoke-test/branches/l300-workshop-smoke-test-branch"
            database: "projects/l300-workshop-smoke-test/branches/l300-workshop-smoke-test-branch/databases/databricks-postgres"
            permission: "CAN_CONNECT_AND_CREATE"
        - name: "policy_docs_index"
          uc_securable:
            securable_full_name: "ai_days_experiment_catalog.retail_agent.policy_docs_index"
            securable_type: "TABLE"
            permission: "SELECT"

targets:
  dev:
    mode: development
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/retail_grocery_ltm_memory/${bundle.target}

  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/retail_grocery_ltm_memory/${bundle.target}
    resources:
      apps:
        retail_grocery_ltm_memory:
          name: retail-grocery-ltm-memory
